services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyeyum-fe
    mem_limit: ${FE_MEM_LIMIT:-128m}
    ports:
      - "${FE_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - hyeyum-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: hyeyum-certbot
    mem_limit: ${CERTBOT_MEM_LIMIT:-128m}
    profiles:
      - certbot
    network_mode: host
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: certbot

networks:
  hyeyum-network:
    external: true
